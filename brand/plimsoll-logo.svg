<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140" role="img" aria-label="PLIMSOLL">
  <!-- mark -->
  <g transform="translate(0,10)">
    <defs><clipPath id="d"><circle cx="60" cy="60" r="40"/></clipPath></defs>
    <rect x="20" y="60" width="80" height="40" fill="#B8FF3C" opacity="0.16" clip-path="url(#d)"/>
    <circle cx="60" cy="60" r="40" fill="none" stroke="#E9EFEA" stroke-width="3"/>
    <line x1="8" y1="60" x2="112" y2="60" stroke="#B8FF3C" stroke-width="6.5" stroke-linecap="round"/>
    <circle cx="60" cy="60" r="4.6" fill="#B8FF3C"/>
  </g>
  <!-- wordmark -->
  <text x="140" y="78" font-family="Helvetica Neue, Arial, sans-serif" font-weight="800"
    font-size="48" letter-spacing="6" fill="#E9EFEA">PLIMSOLL</text>
  <text x="143" y="112" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="14"
    letter-spacing="5" fill="#8A968F">THE LINE IT CAN'T CROSS</text>
</svg>
